<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #292f36;
    color: #e0e0e0;
    padding: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .header svg { flex-shrink: 0; }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 6px;
  }

  .toggle-row.global {
    background: rgba(164,31,19,0.25);
    border: 1px solid rgba(164,31,19,0.5);
    margin-bottom: 14px;
  }

  .toggle-label {
    font-size: 13px;
    color: #ccc;
  }

  .toggle-row.global .toggle-label {
    font-weight: 600;
    color: #fff;
  }

  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: #444;
    border-radius: 22px;
    transition: background 0.25s;
  }

  .slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.25s;
  }

  .switch input:checked + .slider { background: #a41f13; }
  .switch input:checked + .slider::before { transform: translateX(18px); }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #666;
    margin: 14px 0 8px 4px;
  }

  .site-list {
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .site-list::-webkit-scrollbar { width: 4px; }
  .site-list::-webkit-scrollbar-track { background: transparent; }
  .site-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  .toggle-row.disabled { opacity: 0.4; pointer-events: none; }

  .site-icon {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    margin-right: 8px;
  }

  .site-name {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 0;
  }

  .site-name span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="6" fill="#a41f13"/>
      <path d="M8 9l8 5-8 5V9z" fill="#fff"/>
      <path d="M17 10h3v8h-3z" fill="#fff" rx="1"/>
    </svg>
    <h1>Auto Skip Intro</h1>
  </div>

  <div class="toggle-row global">
    <span class="toggle-label">Global Ein/Aus</span>
    <label class="switch">
      <input type="checkbox" id="globalToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-label">Seiten</div>
  <div class="site-list" id="siteList"></div>

  <script src="popup.js"></script>
</body>
</html>
